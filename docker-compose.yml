name: gata-postgres

services:
  postgres:
    image: postgres:16
    container_name: gata-league-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gata_league}
      POSTGRES_USER: ${POSTGRES_USER:-gata_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-admin-password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - gata_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gata_admin} -d ${POSTGRES_DB:-gata_league}"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  gata_postgres_data:
